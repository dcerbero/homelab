---
- name: Load .env and create on homeserver
  copy:
    content: |
      PIHOLE_PASS={{ PIHOLE_PASS }}
      PATH_DATA={{ PATH_DATA }}
    dest: "/home/{{ ansible_user }}/services/homelab/services/docker/.env"
    mode: '0600'
- name: Start pihole service
  shell: |
    cd /home/{{ ansible_user }}/services/homelab/services/docker
    docker compose --profile dns up -d
  register: docker_compose_result
- name: Show Docker Compose status
  shell: |
    cd /home/{{ ansible_user }}/services/homelab/services/docker
    docker compose ps
  register: docker_compose_status
  changed_when: false

- name: Display services
  debug:
    msg: "{{ docker_compose_status.stdout_lines }}"

