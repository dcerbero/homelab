---
- name: (re)start pihole with forced password sync
  ansible.builtin.shell: |
    cd /home/{{ ansible_user }}/services/homelab/services/docker
    PIHOLE_PASS='{{ PIHOLE_PASS }}' \
      PATH_DATA={{ PATH_DATA }} \
      docker compose --profile dns up -d --force-recreate --remove-orphans 2>&1
  register: pihole_result
  changed_when: pihole_result.stdout is search("Recreated|Started")