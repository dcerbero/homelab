---
- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Tailscale GPG key
  shell: |
    curl -fsSL https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }}/{{ ansible_distribution_release }}.gpg -o /etc/apt/keyrings/tailscale.asc
    chmod a+r /etc/apt/keyrings/tailscale.asc

- name: Add Tailscale repository
  shell: |
    echo "deb [signed-by=/etc/apt/keyrings/tailscale.asc] https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} main" | tee /etc/apt/sources.list.d/tailscale.list

- name: Update apt cache 
  apt:
    update_cache: yes

- name: Install Tailscale
  apt:
    name: tailscale
    state: present

- name: Start Tailscale service
  systemd:
    name: tailscaled
    state: started
    enabled: yes

- name: Authenticate Tailscale with auth key
  shell: tailscale up --authkey={{ TAILSCALE_AUTH_KEY }} \
    --hostname={{ TAILSCALE_HOSTNAME }}
  ignore_errors: true

- name: Get Tailscale IP
  shell: tailscale ip -4
  register: tailscale_ip
  changed_when: false

- name: Display Tailscale information
  debug:
    msg: |
      ✅ Tailscale configured successfully
      IP: {{ tailscale_ip.stdout }}
      Hostname: {{ TAILSCALE_HOSTNAME }}