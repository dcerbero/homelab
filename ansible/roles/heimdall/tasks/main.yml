---
- name: Ensure heimdall data directory exists
  ansible.builtin.file:
    path: "{{ PATH_DATA }}/heimdall/config"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"

- name: Start heimdall service
  shell: |
    cd /home/{{ ansible_user }}/services/homelab/services/docker
    docker compose --profile dashboard up -d