---
- name: Update and upgrade all packages to the latest version
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600

- name: Create DNS config directory
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    mode: "0755"

- name: Disable DNS stub listener on port 53
  ansible.builtin.copy:
    content: |
      [Resolve]
      DNSStubListener=no
    dest: /etc/systemd/resolved.conf.d/dns.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart systemd-resolved

- name: create folder for services
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/services"
    state: directory
    mode: "0755"

- name: Remove orphaned dependencies with purge
  ansible.builtin.apt:
    autoremove: true
    purge: true
  register: apt_cleanup_result

- name: Clean stale package cache
  ansible.builtin.apt:
    autoclean: true

- name: Registrar resultado de la purga de paquetes huerfanos
  ansible.builtin.debug:
    msg: "Resultado de la limpieza:\n{{ apt_cleanup_result.stdout }}"
  when: apt_cleanup_result.changed