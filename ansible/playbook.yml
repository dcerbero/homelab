---
- name: Setup homeserver
  hosts: homeserver
  become: true

  pre_tasks:
    - name: Update homelab repository
      ansible.builtin.git:
        repo: "https://github.com/dcerbero/homelab.git"
        dest: "/home/{{ ansible_user }}/services/homelab"
        version: main
        force: yes
      tags: always

  roles:
    - role: system-setup
      tags: [system-setup, system]
    - role: docker
      tags: [docker, containers]
    - role: pihole
      tags: [pihole, dns]
    - role: tailscale
      tags: [tailscale, vpn]
    - role: cadvisor
      tags: [cadvisor, monitoring]
    - role: openclaw
      tags: [openclaw, ia]
    - role: headroom
      tags: [headroom, ia]
    - role: heimdall
      tags: [heimdall, dashboard]
    - role: nginx
      tags: [nginx, proxy]