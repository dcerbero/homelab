---
- name: Setup homeserver
  hosts: homeserver
  become: true

  roles:
    - role: system-setup
      tags: [system-setup, system]
    - role: docker
      tags: [docker, containers]
    - role: pihole
      tags: [pihole, dns]
    - role: tailscale
      tags: [tailscale, vpn]
    - role: cadvisor
      tags: [cadvisor, monitoring]
    - role: openclaw
      tags: [openclaw, ia]

    - role: heimdall
      tags: [heimdall, dashboard]
    - role: nginx
      tags: [nginx, proxy]

- name: Setup Oracle Cloud VM (Pi-hole failover)
  hosts: oracle
  become: true

  roles:
    - role: system-setup
      tags: [system-setup, system, oracle]
    - role: docker
      tags: [docker, containers, oracle]
    - role: pihole
      tags: [pihole, dns, oracle]
      vars:
        pihole_path_data: /opt/pihole