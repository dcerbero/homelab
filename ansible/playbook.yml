---
- name: Setup homeserver
  hosts: homeserver
  become: true
  
  roles:
    - system-setup
    - docker
    - pihole

  post_tasks:
    - name: homeserver setup completed
      debug:
        msg: |
          ✅ homeserver setup completed successfully!   
          Servicios instalados:
          - Docker: Instalado y corriendo
          - Pi-hole: Instalado y corriendo