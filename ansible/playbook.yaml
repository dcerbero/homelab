- name: Install Docker on Ubuntu
  hosts: homeserver
  remote_user: baldo  #user in HomeServer
  become: true
  vars:
    arch_mapping:  # Map ansible architecture {{ ansible_architecture }} names to Docker's architecture names
      x86_64: amd64
      aarch64: arm64

  tasks:
    - name: Update and upgrade all packages to the latest version
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        cache_valid_time: 3600
    
    - name: Create DNS config directory
      ansible.builtin.file:
        path: /etc/systemd/resolved.conf.d
        state: directory
        mode: '0755'
    
    - name: Disable DNS stub listener on port 53
      ansible.builtin.copy:
        content: |
          [Resolve]
          DNSStubListener=no
        dest: /etc/systemd/resolved.conf.d/dns.conf
        owner: root
        group: root
        mode: '0644'
      notify: restart systemd-resolved
  
    - name: Install a list of packages
      ansible.builtin.apt:
        pkg:
        - ca-certificates
        - curl
    
    - name: Add Docker's official GPG key
      ansible.builtin.shell: |
        install -m 0755 -d /etc/apt/keyrings 
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
        echo \
        "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu \
        $(. /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}") stable" | \
        tee /etc/apt/sources.list.d/docker.list > /dev/null
        apt-get update
    
    - name: Install the Docker packages
      ansible.builtin.shell: |
        apt-get install docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin -y
    
    - name: Linux post-installation steps for Docker Engine
      ansible.builtin.shell: |
        groupadd docker
        usermod -aG docker $USER
        systemctl enable docker.service
        systemctl enable containerd.service
    - name: create folder for services
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/services"
        state: directory
        mode: '0755'
      become: no
    - name: download homelab code
      ansible.builtin.git:
        repo: 'https://github.com/dcerbero/homelab.git'
        dest: "/home/{{ ansible_user }}/services/homelab"
        version: feature/enero2026
        clone: yes
        update: yes
  handlers:
    - name: restart systemd-resolved
      ansible.builtin.systemd:
        name: systemd-resolved
        state: restarted