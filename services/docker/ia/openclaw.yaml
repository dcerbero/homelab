services:
  openclaw:
    container_name: openclaw
    image: ghcr.io/openclaw/openclaw:latest
    profiles:
      - ia
    restart: always
    ports:
      - "18789:18789"
    environment:
      - OLLAMA_BASE_URL=https://ollama-server-2.tail019d1b.ts.net
      - OPENCLAW_SANDBOX=true
      - OPENCLAW_DISABLE_BONJOUR=true
      - DEFAULT_MODEL=gemma4:e2b
      - OPENCLAW_CORS_ALLOWED_ORIGINS=*
    volumes:
      - ${PATH_DATA}/ia/openclaw/config:/home/node/.openclaw
      - ${PATH_DATA}/ia/openclaw/workspace:/home/node/.openclaw/workspace 
      - /var/run/docker.sock:/var/run/docker.sock 