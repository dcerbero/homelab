services:
  openclaw:
    container_name: openclaw
    image: ghcr.io/openclaw/openclaw:2026.6.11
    pull_policy: always
    profiles:
      - ia
    restart: always
    environment:
      - OPENCLAW_DISABLE_BONJOUR=1
      - OPENCLAW_PLUGINS_ALLOWLIST=openrouter
    volumes:
      - "${PATH_DATA}/ia/openclaw:/home/node/.openclaw"
