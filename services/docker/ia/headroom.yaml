services:
  headroom:
    container_name: headroom
    image: ghcr.io/headroomlabs-ai/headroom:0.30.0-code-slim
    pull_policy: always
    profiles:
      - ia
    restart: unless-stopped
    # solo acceso interno via Docker networking
    volumes:
      - "${PATH_DATA}/ia/headroom:/data"
    environment:
      - HEADROOM_PORT=8787
      - OPENAI_TARGET_API_URL=https://api.deepseek.com
